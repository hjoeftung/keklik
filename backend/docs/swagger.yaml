basePath: /
definitions:
  httpapi.accountIDResponse:
    properties:
      account_id:
        type: string
    type: object
  httpapi.createFamilyInviteLinkResponse:
    properties:
      expires_at:
        type: string
      invite_url:
        type: string
      token:
        type: string
    type: object
  httpapi.createFamilyRequest:
    properties:
      baby_name:
        type: string
      creator_name:
        type: string
    type: object
  httpapi.createFamilyResponse:
    properties:
      baby_id:
        type: string
      family_id:
        type: string
      member_id:
        type: string
    type: object
  httpapi.editSleepSessionRequest:
    properties:
      started_at:
        type: string
      stopped_at:
        type: string
      version:
        type: integer
    type: object
  httpapi.errorResponse:
    properties:
      code:
        type: string
      conflict: {}
      message:
        type: string
    type: object
  httpapi.getFamilyBabyResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  httpapi.getFamilyMemberResponse:
    properties:
      account_id:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  httpapi.getFamilyResponse:
    properties:
      baby:
        $ref: '#/definitions/httpapi.getFamilyBabyResponse'
      family_id:
        type: string
      members:
        items:
          $ref: '#/definitions/httpapi.getFamilyMemberResponse'
        type: array
    type: object
  httpapi.healthResponse:
    properties:
      status:
        type: string
    type: object
  httpapi.joinFamilyByInviteLinkRequest:
    properties:
      member_name:
        type: string
      token:
        type: string
    type: object
  httpapi.joinFamilyByInviteLinkResponse:
    properties:
      family_id:
        type: string
      member_id:
        type: string
    type: object
  httpapi.logPastSleepRequest:
    properties:
      started_at:
        type: string
      stopped_at:
        type: string
    type: object
  httpapi.logPastSleepResponse:
    properties:
      id:
        type: string
      started_at:
        type: string
      stopped_at:
        type: string
      version:
        type: integer
    type: object
  httpapi.nightWindowInfoResponse:
    properties:
      end_hhmm:
        type: string
      start_hhmm:
        type: string
    type: object
  httpapi.periodAvgResponse:
    properties:
      avg_active_seconds:
        type: number
      avg_nap_seconds:
        type: number
      avg_sleep_seconds:
        type: number
    type: object
  httpapi.setNightWindowRequest:
    properties:
      effective_from:
        type: string
      end_hour:
        type: integer
      end_minute:
        type: integer
      start_hour:
        type: integer
      start_minute:
        type: integer
    type: object
  httpapi.sleepSessionResponse:
    properties:
      baby_id:
        type: string
      classification:
        type: string
      duration_seconds:
        type: number
      id:
        type: string
      started_at:
        type: string
      stopped_at:
        type: string
      version:
        type: integer
    type: object
  httpapi.sleepStatsResponse:
    properties:
      night_window:
        $ref: '#/definitions/httpapi.nightWindowInfoResponse'
      summary:
        additionalProperties:
          $ref: '#/definitions/httpapi.periodAvgResponse'
        type: object
      today:
        $ref: '#/definitions/httpapi.todayStatsResponse'
    type: object
  httpapi.startSleepRequest:
    properties:
      started_at:
        type: string
    type: object
  httpapi.startSleepResponse:
    properties:
      id:
        type: string
      started_at:
        type: string
      version:
        type: integer
    type: object
  httpapi.stopSleepRequest:
    properties:
      stopped_at:
        type: string
    type: object
  httpapi.stopSleepResponse:
    properties:
      id:
        type: string
      started_at:
        type: string
      stopped_at:
        type: string
      version:
        type: integer
    type: object
  httpapi.testLoginRequest:
    properties:
      identifier:
        type: string
    type: object
  httpapi.todayStatsResponse:
    properties:
      total_active_seconds:
        type: number
      total_nap_seconds:
        type: number
      total_sleep_seconds:
        type: number
    type: object
host: localhost:8080
info:
  contact: {}
  description: Baby sleep tracking API for families.
  title: Keklik API
  version: "1.0"
paths:
  /auth/google/callback:
    get:
      parameters:
      - description: Authorization code returned by Google
        in: query
        name: code
        required: true
        type: string
      - description: State value for CSRF verification
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Found
      summary: Google OAuth callback
      tags:
      - auth
  /auth/google/start:
    get:
      responses:
        "307":
          description: Redirect to Google authorisation page
          schema:
            type: string
      summary: Start Google OAuth flow
      tags:
      - auth
  /auth/logout:
    post:
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Refresh access token
      tags:
      - auth
  /auth/test/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Test login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.testLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.accountIDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      summary: Test login (dev/staging only)
      tags:
      - auth
  /babies/{baby_id}/night-windows:
    post:
      consumes:
      - application/json
      parameters:
      - description: Baby ID
        in: path
        name: baby_id
        required: true
        type: string
      - description: Night window configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.setNightWindowRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Set night window
      tags:
      - sleep
  /babies/{baby_id}/sleep-sessions:
    get:
      parameters:
      - description: Baby ID
        in: path
        name: baby_id
        required: true
        type: string
      - description: 'History window: today, or Nd where 1 ≤ N ≤ 120 (default: 7d)'
        in: query
        name: period
        type: string
      - description: IANA timezone, e.g. America/New_York
        in: query
        name: timezone
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/httpapi.sleepSessionResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Get sleep history
      tags:
      - sleep
    post:
      consumes:
      - application/json
      parameters:
      - description: Baby ID
        in: path
        name: baby_id
        required: true
        type: string
      - description: Start and end times of the completed session
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.logPastSleepRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.logPastSleepResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "409":
          description: Session overlaps an existing session
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Log past sleep session
      tags:
      - sleep
  /babies/{baby_id}/sleep-sessions/{id}:
    delete:
      parameters:
      - description: Baby ID
        in: path
        name: baby_id
        required: true
        type: string
      - description: Sleep session UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete sleep session
      tags:
      - sleep
    patch:
      consumes:
      - application/json
      parameters:
      - description: Baby ID
        in: path
        name: baby_id
        required: true
        type: string
      - description: Sleep session UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (at least one required)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.editSleepSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.sleepSessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Edit sleep session
      tags:
      - sleep
  /babies/{baby_id}/sleep-sessions/active:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Baby ID
        in: path
        name: baby_id
        required: true
        type: string
      - description: Optional explicit stop time (defaults to now)
        in: body
        name: body
        schema:
          $ref: '#/definitions/httpapi.stopSleepRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.stopSleepResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Stop active sleep session
      tags:
      - sleep
    post:
      consumes:
      - application/json
      parameters:
      - description: Baby ID
        in: path
        name: baby_id
        required: true
        type: string
      - description: Optional explicit start time (defaults to now)
        in: body
        name: body
        schema:
          $ref: '#/definitions/httpapi.startSleepRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.startSleepResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "409":
          description: Active sleep session already exists
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Start sleep session
      tags:
      - sleep
  /babies/{baby_id}/sleep-stats:
    get:
      parameters:
      - description: Baby ID
        in: path
        name: baby_id
        required: true
        type: string
      - description: IANA timezone, e.g. America/New_York
        in: query
        name: timezone
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.sleepStatsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Get sleep stats
      tags:
      - sleep
  /families:
    post:
      consumes:
      - application/json
      parameters:
      - description: Family creation payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.createFamilyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.createFamilyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Create family
      tags:
      - families
  /families/invite-links:
    post:
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.createFamilyInviteLinkResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Create family invite link
      tags:
      - families
  /families/invite-links/{token}:
    delete:
      parameters:
      - description: Invite token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Revoke family invite link
      tags:
      - families
  /families/join-by-invite-link:
    post:
      consumes:
      - application/json
      parameters:
      - description: Invite token and member name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/httpapi.joinFamilyByInviteLinkRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/httpapi.joinFamilyByInviteLinkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Join family by invite link
      tags:
      - families
  /family:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.getFamilyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpapi.errorResponse'
      security:
      - BearerAuth: []
      summary: Get family
      tags:
      - families
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpapi.healthResponse'
      summary: Health check
      tags:
      - system
securityDefinitions:
  BearerAuth:
    description: Session token obtained from the auth endpoints.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
