<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Option A: warm background -->
  <rect x="0" y="0" width="120" height="120" fill="#E59B6A"/>

  <!-- Option C: simplified — body only, no side ears, no ear tufts; translate(-16) centers vertically -->
  <g transform="translate(0, -16)">
    <path d="M 60 36 C 38 36, 24 56, 24 78 C 24 100, 40 116, 60 116 C 80 116, 96 100, 96 78 C 96 56, 82 36, 60 36 Z" fill="#FBE4D1" stroke="#C97B4D" stroke-width="2" stroke-opacity="0.5"/>

    <!-- Blush -->
    <ellipse cx="40" cy="76" rx="6" ry="4" fill="#C97B4D" opacity="0.3"/>
    <ellipse cx="78" cy="76" rx="6" ry="4" fill="#C97B4D" opacity="0.3"/>

    <!-- Eyes -->
    <ellipse cx="49" cy="69" rx="3.2" ry="3.6" fill="#2E2A33"/>
    <ellipse cx="71" cy="69" rx="3.2" ry="3.6" fill="#2E2A33"/>
    <circle cx="50" cy="67.5" r="1" fill="#fff"/>
    <circle cx="72" cy="67.5" r="1" fill="#fff"/>

    <!-- Nose -->
    <path d="M 56 78 L 60 84 L 64 78 Q 60 76, 56 78 Z" fill="#E8B86E" stroke="#C97B4D" stroke-width="1.2" stroke-opacity="0.6" stroke-linejoin="round"/>
  </g>
</svg>
