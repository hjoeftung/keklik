name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Go changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Verify gofmt
        shell: bash
        working-directory: backend
        run: |
          mapfile -t files < <(find . -type f -name '*.go' -not -path './vendor/*' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            exit 0
          fi

          unformatted=$(gofmt -l "${files[@]}")

          if [ -n "$unformatted" ]; then
            echo "These files are not formatted with gofmt:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Run go vet
        working-directory: backend
        run: go vet ./...

      - name: Run tests
        working-directory: backend
        run: go test ./...

      - name: Build API binary
        working-directory: backend
        run: go build ./cmd/api

      - name: Check OpenAPI spec is up to date
        working-directory: backend
        run: |
          go run github.com/swaggo/swag/cmd/swag@v1.16.4 init \
            -g cmd/api/main.go --dir . --output docs --outputTypes yaml
          git diff --exit-code docs/swagger.yaml